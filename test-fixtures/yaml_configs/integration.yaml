# Single source of truth for non-secret integration test config.
#
# Service blocks land here as their tool-group integration tests do; each
# sits under a `# --- @<tag> ---` marker. Handlers gating on a block that
# isn't here yet skip via the empty-runtime path.
#
# Update these literals in place when resource identifiers change.
#
# Secrets stay as `${VAR}` interpolation, sourced from `.env.integration`
# (which `make setup-test-env` writes from Vault).
#
# A missing secret env var throws at YAML load time; `tests/harness/runtime.ts`
# catches it, returns an empty runtime, and every test's
# `enabledConnectionIds(runtime)` gate yields a clean skip with the
# handler's predicate config path as the reason.
server:
  log_level: error

connections:
  integration:
    type: direct

    # --- @kafka (admin client + REST proxy) ---
    kafka:
      auth:
        type: api_key
        key: "${KAFKA_API_KEY}"
        secret: "${KAFKA_API_SECRET}"
      bootstrap_servers: "pkc-921jm.us-east-2.aws.confluent.cloud:9092"
      cluster_id: "lkc-dm5vyd"
      env_id: "env-rw7g8k"
      rest_endpoint: "https://pkc-921jm.us-east-2.aws.confluent.cloud:443"

    # --- @schema (Schema Registry) ---
    schema_registry:
      auth:
        type: api_key
        key: "${SCHEMA_REGISTRY_API_KEY}"
        secret: "${SCHEMA_REGISTRY_API_SECRET}"
      endpoint: "https://psrc-4xmdo33.us-east-2.aws.confluent.cloud"

    # --- @clusters / @environments / @connect / @catalog / @search / @billing (CCloud control plane) ---
    confluent_cloud:
      auth:
        type: api_key
        key: "${CONFLUENT_CLOUD_API_KEY}"
        secret: "${CONFLUENT_CLOUD_API_SECRET}"

    # --- @metrics (Telemetry API) ---
    telemetry:
      auth:
        type: api_key
        key: "${TELEMETRY_API_KEY}"
        secret: "${TELEMETRY_API_SECRET}"

    # --- @flink (Flink SQL + catalog/diagnostics) ---
    flink:
      auth:
        type: api_key
        key: "${FLINK_API_KEY}"
        secret: "${FLINK_API_SECRET}"
      compute_pool_id: "lfcp-1gv99z"
      endpoint: "https://flink.us-east-2.aws.confluent.cloud"
      environment_id: "env-rw7g8k"
      organization_id: "683187f4-4132-484a-adf7-0553cea0a5e4"

    # --- @tableflow ---
    tableflow:
      auth:
        type: api_key
        key: "${TABLEFLOW_API_KEY}"
        secret: "${TABLEFLOW_API_SECRET}"
