name: mcp-confluent
lang: unknown
lang_version: unknown
git:
  enable: true
codeowners:
  enable: true
renovatebot:
  enable: false
semaphore:
  enable: true
  pipeline_enable: false
  status_level: block
  tasks:
    - name: create-github-tag
      branch: main
      pipeline_file: .semaphore/create-github-tag.yml
      parameters:
        - name: TAG_NAME
          required: true
          description: The name of the tag to be created.
          default_value: "X.Y.Z"
