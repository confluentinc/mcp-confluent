connections:
  production:
    type: direct
    confluent_cloud:
      endpoint: "https://api.confluent.cloud"
      auth:
        type: api_key
        key: "mycloudkey"
        secret: "mycloudsecret"
    flink:
      endpoint: "https://flink.confluent.cloud"
