name: mcp-confluent
lang: node
lang_version: "22"
git:
  enable: true
codeowners:
  enable: true
renovatebot:
  enable: false
sonarqube:
  enable: true
  languages:
    - javascript
    - typescript
  coverage_sources:
    - "src"
  coverage_exclusions:
    - "src/**/*.test.ts"
    - "src/**/*.d.ts"
  coverage_reports:
    - "coverage/lcov.info"
  main_branch: main
semaphore:
  enable: true
  pipeline_enable: false
  status_level: block
  tasks:
    - name: release-version
      branch: main
      pipeline_file: .semaphore/release-version.yml
      parameters:
        - name: IS_PRERELEASE
          required: true
          options:
            - "true"
            - "false"
          default_value: "true"
          description: 'Whether the release is a pre-release (true/false).'
        - name: TARGET_BRANCH
          required: true
          default_value: "main"
          description: 'The target branch to create the release from, must be a valid branch.'
        - name: RELEASE_NAME
          required: true
          description: 'The name of the GitHub Release (and tag) to create (e.g., v1.2.0). Do not include -pre suffixes for prereleases; set IS_PRERELEASE to true instead.'
        - name: COMMIT_SHA
          required: true
          description: 'The commit SHA to create the release and tag from, must be a valid SHA/tag/branch.'
        - name: PREVIOUS_RELEASE_TAG
          required: false
          description: 'The previous release tag for generating release notes. If not provided, will use the latest (non-prerelease) GitHub Release.'
    - name: scheduled-npm-audit
      branch: main
      pipeline_file: .semaphore/npm-audit.yml
      scheduled: true
      at: '0 6 * * *' # Daily at 06:00 UTC
      parameters:
        - name: TARGET_BRANCH
          required: false
          default_value: 'main'
          description: 'The branch to audit and base the PR against. Defaults to main; override for release branches like v1.2.x.'
    - name: scheduled-docker-image-scan
      branch: main
      pipeline_file: .semaphore/docker-image-scan.yml
      scheduled: true
      at: "0 12 * * *" # Daily at 12:00 UTC
