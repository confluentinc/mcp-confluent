version: v1.0
name: CI
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-2

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - sem-version node 22
      - checkout
      - cache restore npm-cache-
      - npm ci --prefer-offline
  epilogue:
    commands:
      - cache store npm-cache-$(checksum package-lock.json) ~/.npm

blocks:
  - name: "Static Analysis"
    dependencies: []
    task:
      jobs:
        - name: "ESLint"
          commands:
            - npm run lint
        - name: "TypeScript"
          commands:
            - npm run typecheck

  - name: "Build & Test"
    dependencies: ["Static Analysis"]
    task:
      jobs:
        - name: "Build & Test"
          commands:
            - npm run build
            - npm run test:coverage
      epilogue:
        always:
          commands:
            - >-
              if [ -f TEST-result.xml ]; then
                test-results publish TEST-result.xml --force;
              fi
            - sem-version java 17
            - emit-sonarqube-data --run_only_sonar_scan --enable_sonarqube_enterprise

after_pipeline:
  task:
    jobs:
      - name: Publish Test Results
        commands:
          - test-results gen-pipeline-report || true

promotions:
  - name: Docker Image Scan
    pipeline_file: docker-image-scan.yml
