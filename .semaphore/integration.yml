version: v1.0
name: "MCP Integration Tests"
agent:
  machine:
    type: s1-prod-ubuntu24-04-amd64-1

auto_cancel:
  running:
    when: "branch != 'main'"

execution_time_limit:
  hours: 1

queue:
  - when: "branch != 'main'"
    processing: parallel

global_job_config:
  prologue:
    commands:
      - sem-version node 22
      - checkout
      - cache restore npm-cache-
      - npm ci --prefer-offline --include=dev
      - . vault-setup --version v3 --role mcp-confluent
      - make setup-test-env
      - npm run build
  epilogue:
    always:
      commands:
        - make remove-test-env
        - make store-integration-test-results TAG="$TOOL_GROUP" TRANSPORT="$TRANSPORT"

blocks:
  - name: "Integration Tests: stdio"
    dependencies: []
    # skip this block when the triggering parameters don't include stdio
    skip:
      when: "'${{parameters.TRANSPORTS}}' !~ 'stdio'"
    task:
      env_vars:
        - name: TRANSPORT
          value: stdio
      jobs: &transport-jobs
        - name: "Integration: ${TOOL_GROUP} (${TRANSPORT})"
          commands:
            - make test-integration TAG="$TOOL_GROUP" TRANSPORT="$TRANSPORT"
          # matrix axis: pipe-split TOOL_GROUPS from pipeline parameters. one
          # job per tool-group tag within this transport's block.
          matrix:
            - env_var: TOOL_GROUP
              values: '%{{parameters.TOOL_GROUPS | splitList "|"}}'

  - name: "Integration Tests: http"
    dependencies: []
    skip:
      when: "'${{parameters.TRANSPORTS}}' !~ 'http'"
    task:
      env_vars:
        - name: TRANSPORT
          value: http
      jobs: *transport-jobs

  - name: "Integration Tests: sse"
    dependencies: []
    skip:
      when: "'${{parameters.TRANSPORTS}}' !~ 'sse'"
    task:
      env_vars:
        - name: TRANSPORT
          value: sse
      jobs: *transport-jobs

after_pipeline:
  task:
    jobs:
      - name: Publish Pipeline Report
        commands:
          - test-results gen-pipeline-report || true
