services:
  mcp-server:
    build: . ## build Dockerfile
    ports:
      - "${HTTP_PORT:-8080}:${HTTP_PORT:-8080}"

    # keeping the container running
    stdin_open: true
    tty: true

    # The MCP server reads its config from `config.yaml` (preferred) or, on the
    # legacy path, from environment variables. See CONFIGURATION.md for the
    # full reference. Typical setup:
    #
    #   1. Mount your `config.yaml` into the container and pass `--config` to
    #      the entrypoint, e.g. via `command: ["--config", "/etc/mcp/config.yaml"]`
    #      plus a `volumes:` entry.
    #   2. Keep secrets in a `.env` (loaded via `env_file:` below) and
    #      reference them from `config.yaml` with `${VAR}` interpolation.
    env_file:
      - .env

    environment:
      # 0.0.0.0 is the default inside containers so the host port mapping above
      # can reach the server. Override server.http.host in YAML if you need to.
      HTTP_HOST: "${HTTP_HOST:-0.0.0.0}"
